<ion-content [fullscreen]="true">
  <div class="min-h-full bg-app font-sans pb-6">
    <!-- Hero -->
    <section class="relative overflow-hidden bg-hero text-on-dark px-5 pt-10 pb-7 rounded-b-3xl">
      <div class="pointer-events-none absolute -top-20 -right-16 w-64 h-64 rounded-full bg-accent/15 blur-3xl"></div>
      <div
        class="pointer-events-none absolute -bottom-12 -left-12 w-48 h-48 rounded-full bg-chip-sky-bg/10 blur-3xl"></div>

      <div class="relative max-w-md mx-auto">
        <div class="flex items-center justify-between">
          <button
            type="button"
            (click)="goBack()"
            class="inline-flex items-center gap-1.5 text-on-dark-soft text-sm font-medium active:opacity-70 transition"
            aria-label="Kembali">
            <svg
              class="w-4 h-4"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M15 18l-6-6 6-6" />
            </svg>
            Kembali
          </button>
          <span class="block w-1.5 h-1.5 rounded-full bg-accent-warm"></span>
        </div>

        <div class="mt-6">
          <div class="flex items-center gap-2.5">
            <span class="block h-px w-5 bg-accent-warm"></span>
            <p class="text-[11px] tracking-[0.22em] uppercase text-on-dark-soft font-semibold">Alat bantu</p>
          </div>
          <h1 class="font-display text-[2.2rem] leading-[1.05] mt-3">
            Kalkulator
            <span class="italic text-accent-warm">cepat.</span>
          </h1>
        </div>
      </div>
    </section>

    <section class="px-5 -mt-4 relative z-10 max-w-md mx-auto">
      <app-calc-pad />
    </section>
  </div>
</ion-content>
