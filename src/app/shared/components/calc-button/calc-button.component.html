<button
  type="button"
  (click)="open()"
  [disabled]="disabled()"
  [attr.aria-label]="ariaLabel()"
  class="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-transparent text-ink-muted hover:text-ink hover:bg-ink/5 active:scale-90 transition disabled:opacity-30 disabled:active:scale-100">
  <svg
    class="w-4 h-4"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="1.75"
    stroke-linecap="round"
    stroke-linejoin="round">
    <rect x="5" y="3" width="14" height="18" rx="2" />
    <line x1="9" y1="7" x2="15" y2="7" />
    <line x1="9" y1="11" x2="9.01" y2="11" />
    <line x1="12" y1="11" x2="12.01" y2="11" />
    <line x1="15" y1="11" x2="15.01" y2="11" />
    <line x1="9" y1="15" x2="9.01" y2="15" />
    <line x1="12" y1="15" x2="12.01" y2="15" />
    <line x1="15" y1="15" x2="15.01" y2="15" />
    <line x1="9" y1="19" x2="9.01" y2="19" />
    <line x1="12" y1="19" x2="15" y2="19" />
  </svg>
</button>

<ion-modal
  [isOpen]="isOpen()"
  (didDismiss)="close()"
  [breakpoints]="[0, 0.95]"
  [initialBreakpoint]="0.95"
  handleBehavior="cycle">
  <ng-template>
    <div class="bg-app font-sans h-full flex flex-col">
      <header class="px-5 pt-5 pb-3 flex items-center justify-between shrink-0">
        <div>
          <div class="flex items-center gap-2.5">
            <span class="block h-px w-5 bg-accent"></span>
            <p class="text-[11px] tracking-[0.22em] uppercase text-ink-muted font-semibold">Alat bantu</p>
          </div>
          <h2 class="font-display text-2xl text-ink mt-2">
            Kalkulator
            <span class="italic text-accent">cepat.</span>
          </h2>
        </div>
        <button
          type="button"
          (click)="close()"
          class="rounded-full w-9 h-9 inline-flex items-center justify-center text-ink-muted active:bg-ink/5 transition"
          aria-label="Tutup">
          <svg
            class="w-5 h-5"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </header>

      <div class="flex-1 overflow-y-auto px-5 pb-[max(1.5rem,env(safe-area-inset-bottom))]">
        <app-calc-pad
          [initialValue]="seedValue()"
          [showApply]="true"
          [allowNegative]="allowNegative()"
          (apply)="onApply($event)" />
      </div>
    </div>
  </ng-template>
</ion-modal>
