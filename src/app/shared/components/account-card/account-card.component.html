<button
  type="button"
  (click)="cardClick.emit(account().id)"
  class="text-left w-full bg-card rounded-2xl shadow-card p-5 active:scale-[0.99] transition flex flex-col gap-4"
>
  <!-- Header: type icon + label + name -->
  <div class="flex items-start gap-3">
    <span
      class="inline-flex items-center justify-center w-10 h-10 rounded-xl shrink-0"
      [class.bg-chip-cream-bg]="account().type === 'cash'"
      [class.text-chip-cream-ink]="account().type === 'cash'"
      [class.bg-chip-sky-bg]="account().type === 'bank'"
      [class.text-chip-sky-ink]="account().type === 'bank'"
      [class.bg-chip-coral-bg]="account().type === 'credit'"
      [class.text-chip-coral-ink]="account().type === 'credit'"
      [class.bg-chip-green-bg]="account().type === 'savings'"
      [class.text-chip-green-ink]="account().type === 'savings'"
    >
      <svg
        class="w-5 h-5"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.75"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        @switch (account().type) {
          @case ('cash') {
            <path
              d="M3 8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"
            />
            <circle cx="16" cy="12" r="1.6" />
          }
          @case ('bank') {
            <path
              d="M3 21h18 M3 10h18 M5 10v11 M9 10v11 M15 10v11 M19 10v11 M12 3l9 7H3z"
            />
          }
          @case ('credit') {
            <rect x="2" y="6" width="20" height="13" rx="2" />
            <line x1="2" y1="11" x2="22" y2="11" />
            <line x1="6" y1="15" x2="10" y2="15" />
          }
          @case ('savings') {
            <polyline points="3 17 9 11 13 15 21 7" />
            <polyline points="14 7 21 7 21 14" />
          }
        }
      </svg>
    </span>

    <div class="min-w-0 flex-1">
      <p
        class="text-[10px] tracking-[0.18em] uppercase text-ink-muted font-semibold"
      >
        {{ typeLabel() }}
      </p>
      <h3 class="font-display text-lg text-ink leading-tight mt-0.5 truncate">
        {{ account().name }}
      </h3>
    </div>

    @if (hasReservation() && account().type !== 'credit') {
      <span
        class="shrink-0 inline-block w-1.5 h-1.5 rounded-full bg-accent mt-2"
        title="Memiliki reservasi tertunda"
      ></span>
    }
  </div>

  <!-- Balance block -->
  <div>
    <p
      class="text-[10px] tracking-[0.18em] uppercase text-ink-muted font-semibold"
    >
      Aktual
    </p>
    <p class="font-display text-2xl text-ink mt-1 break-words">
      {{ account().balance | currencyFormat: account().currency_code }}
    </p>
    @if (debtAmount() > 0) {
      <span
        class="inline-flex items-center gap-1.5 rounded-full bg-chip-coral-bg text-chip-coral-ink text-xs font-semibold px-3 py-1.5 mt-2"
      >
        Hutang
        {{ debtAmount() | currencyFormat: account().currency_code }}
      </span>
      @if (shortfallAmount() > 0) {
        <p class="text-[11px] text-chip-coral-ink font-semibold mt-1.5">
          Kurang
          {{ shortfallAmount() | currencyFormat: account().currency_code }}
        </p>
      }
    }
  </div>

  <!-- Credit utilization bar -->
  @if (account().type === 'credit' && account().credit_limit) {
    <div>
      <div class="h-1.5 w-full rounded-full bg-app overflow-hidden">
        <div
          class="h-full rounded-full transition-[width] duration-500"
          [class.bg-chip-green-ink]="utilizationLevel() === 'low'"
          [class.bg-chip-amber-ink]="utilizationLevel() === 'mid'"
          [class.bg-chip-coral-ink]="utilizationLevel() === 'high'"
          [style.width.%]="utilizationPct()"
        ></div>
      </div>
      <p class="text-[11px] text-ink-muted mt-2">
        {{ utilizationPct() }}% terpakai &middot;
        {{ availableCredit() | currencyFormat: account().currency_code }} sisa
      </p>
    </div>
  }
</button>
