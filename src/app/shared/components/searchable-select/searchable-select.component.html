<!-- Trigger: looks like the existing input/select field it replaces -->
<button
  type="button"
  (click)="open()"
  [disabled]="disabled()"
  [class.rounded-xl]="!compact()"
  [class.rounded-lg]="compact()"
  [class.px-4]="!compact()"
  [class.px-3]="compact()"
  [class.py-3]="!compact()"
  [class.py-2]="compact()"
  [class.bg-app]="!compact()"
  [class.bg-card]="compact()"
  [class.text-sm]="compact()"
  class="group w-full border border-ink/10 text-left focus:outline-none focus:border-accent focus:ring-2 focus:ring-accent/20 disabled:opacity-70 transition flex items-center justify-between gap-3"
>
  <span class="min-w-0 flex-1 truncate">
    @if (selectedOption(); as opt) {
      <span class="text-ink">{{ opt.label }}</span>
      @if (opt.sublabel) {
        <span class="text-ink-muted text-xs ml-1">· {{ opt.sublabel }}</span>
      }
    } @else {
      <span class="text-ink-muted">{{ placeholder() }}</span>
    }
  </span>
  <svg
    class="w-4 h-4 text-ink-muted shrink-0 transition-transform group-active:translate-y-0.5"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    aria-hidden="true"
  >
    <polyline points="6 9 12 15 18 9" />
  </svg>
</button>

<!-- Bottom-sheet picker -->
<ion-modal
  [isOpen]="modalOpen()"
  (didDismiss)="close()"
  (didPresent)="onPresented()"
  [breakpoints]="[0, 0.9]"
  [initialBreakpoint]="0.9"
  handleBehavior="cycle"
>
  <ng-template>
    <div class="bg-app h-full flex flex-col">
      <!-- Header band: eyebrow + title + close -->
      <div class="px-6 pt-5 pb-4 shrink-0">
        <div class="flex items-start justify-between gap-3">
          <div class="min-w-0 flex-1">
            <p
              class="text-[10px] tracking-[0.22em] uppercase text-ink-muted font-semibold"
            >
              {{ modalEyebrow() }}
            </p>
            <p
              class="font-display text-[1.5rem] leading-tight text-ink mt-1 truncate"
            >
              {{ modalTitle() }}
            </p>
          </div>
          <button
            type="button"
            (click)="close()"
            class="shrink-0 w-9 h-9 rounded-full grid place-items-center text-ink-muted hover:bg-card hover:text-ink active:scale-95 transition"
            aria-label="Tutup"
          >
            <svg
              class="w-4 h-4"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              aria-hidden="true"
            >
              <path d="M6 6l12 12 M6 18L18 6" />
            </svg>
          </button>
        </div>

        <!-- Search input -->
        <div class="relative mt-4">
          <svg
            class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-ink-muted pointer-events-none"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <circle cx="11" cy="11" r="7" />
            <path d="M21 21l-4.35-4.35" />
          </svg>
          <input
            #searchInput
            type="text"
            inputmode="search"
            autocomplete="off"
            autocapitalize="none"
            spellcheck="false"
            [placeholder]="searchPlaceholder()"
            [value]="query()"
            (input)="onSearchInput($event)"
            class="w-full rounded-xl bg-card border border-ink/10 pl-10 pr-10 py-3 text-ink placeholder:text-ink-muted focus:outline-none focus:border-accent focus:ring-2 focus:ring-accent/20"
          />
          @if (query()) {
            <button
              type="button"
              (click)="query.set('')"
              class="absolute right-2 top-1/2 -translate-y-1/2 w-7 h-7 rounded-full grid place-items-center text-ink-muted hover:bg-app hover:text-ink active:scale-90 transition"
              aria-label="Bersihkan pencarian"
            >
              <svg
                class="w-3.5 h-3.5"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.25"
                stroke-linecap="round"
                aria-hidden="true"
              >
                <path d="M6 6l12 12 M6 18L18 6" />
              </svg>
            </button>
          }
        </div>
      </div>

      <!-- Scrollable list -->
      <div class="flex-1 overflow-y-auto px-4 pb-[max(1.5rem,env(safe-area-inset-bottom))]">
        @if (allowClear() && value() != null && !query()) {
          <button
            type="button"
            (click)="clear()"
            class="w-full mb-2 rounded-xl bg-transparent border border-dashed border-ink/20 px-4 py-2.5 text-sm text-ink-soft text-left hover:bg-card active:scale-[0.99] transition inline-flex items-center gap-2"
          >
            <svg
              class="w-3.5 h-3.5"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              aria-hidden="true"
            >
              <path d="M6 6l12 12 M6 18L18 6" />
            </svg>
            Kosongkan pilihan
          </button>
        }

        @if (filteredOptions().length > 0) {
          <ul role="listbox" class="flex flex-col gap-1.5">
            @for (opt of filteredOptions(); track opt.id) {
              <li>
                <button
                  type="button"
                  role="option"
                  [attr.aria-selected]="opt.id === value()"
                  [disabled]="opt.disabled"
                  (click)="select(opt)"
                  class="w-full rounded-xl bg-card px-4 py-3 text-left transition flex items-center gap-3 hover:ring-1 hover:ring-ink/10 active:scale-[0.99] disabled:opacity-40 disabled:cursor-not-allowed"
                  [class.ring-2]="opt.id === value()"
                  [class.ring-accent]="opt.id === value()"
                  [class.shadow-card]="opt.id === value()"
                >
                  <div class="min-w-0 flex-1">
                    <p
                      class="text-sm text-ink truncate"
                      [class.font-semibold]="opt.id === value()"
                    >
                      {{ opt.label }}
                    </p>
                    @if (opt.sublabel) {
                      <p
                        class="text-[11px] text-ink-muted truncate mt-0.5"
                      >
                        {{ opt.sublabel }}
                      </p>
                    }
                  </div>
                  @if (opt.hint) {
                    <span
                      class="shrink-0 inline-flex items-center gap-1 rounded-full bg-chip-cream-bg text-chip-cream-ink text-[10px] font-semibold px-2 py-0.5 max-w-[8rem] truncate"
                    >
                      {{ opt.hint }}
                    </span>
                  }
                  @if (opt.id === value()) {
                    <span
                      aria-hidden="true"
                      class="shrink-0 w-5 h-5 rounded-full bg-accent grid place-items-center"
                    >
                      <svg
                        class="w-3 h-3 text-on-dark"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="3"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <polyline points="20 6 9 17 4 12" />
                      </svg>
                    </span>
                  }
                </button>
              </li>
            }
          </ul>
        } @else {
          <div class="text-center py-16 px-6">
            <p class="font-display italic text-ink-muted text-base">
              {{ emptyMessage() }}
            </p>
            @if (query()) {
              <p class="text-xs text-ink-muted/70 mt-2">
                untuk &ldquo;{{ query() }}&rdquo;
              </p>
            }
          </div>
        }
      </div>
    </div>
  </ng-template>
</ion-modal>
