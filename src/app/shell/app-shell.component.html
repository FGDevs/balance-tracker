<ion-router-outlet></ion-router-outlet>

<!-- Floating tab bar -->
<nav
  class="fixed inset-x-0 bottom-0 z-30 px-4 pt-2 pb-[max(1rem,env(safe-area-inset-bottom))] pointer-events-none transition-all duration-300 ease-out"
  [class.opacity-0]="!showBar()"
  [class.translate-y-full]="!showBar()"
  aria-label="Navigasi utama"
>
  <div class="relative max-w-md mx-auto pointer-events-auto">

    <!-- Backdrop tap-catcher when fab menu is open (closes on outside tap) -->
    @if (fabExpanded()) {
      <button
        type="button"
        class="fixed inset-0 z-0 bg-hero/20 backdrop-blur-[2px] cursor-default"
        (click)="closeFabMenu()"
        aria-label="Tutup menu"
      ></button>
    }

    <!-- The pill bar -->
    <div
      class="relative bg-card rounded-full shadow-[0_12px_32px_-12px_rgba(61,36,24,0.28)] h-16 flex items-center justify-around px-2 border border-ink/5"
    >
      <!-- Dashboard -->
      <a
        routerLink="/dashboard"
        class="relative flex items-center justify-center w-12 h-12 transition-colors"
        [class.text-ink]="activeTab() === 'dashboard'"
        [class.text-ink-muted]="activeTab() !== 'dashboard'"
        aria-label="Beranda"
      >
        <svg
          class="w-[22px] h-[22px]"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M3 12l9-9 9 9" />
          <path d="M5 10v10h4v-6h6v6h4V10" />
        </svg>
        @if (activeTab() === 'dashboard') {
          <span
            class="absolute bottom-1.5 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full bg-accent"
          ></span>
        }
      </a>

      <!-- Accounts -->
      <a
        routerLink="/accounts"
        class="relative flex items-center justify-center w-12 h-12 transition-colors"
        [class.text-ink]="activeTab() === 'accounts'"
        [class.text-ink-muted]="activeTab() !== 'accounts'"
        aria-label="Akun"
      >
        <svg
          class="w-[22px] h-[22px]"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="2" y="7" width="20" height="13" rx="2" />
          <path d="M6 7V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v2" />
          <circle cx="17" cy="14" r="1.4" />
        </svg>
        @if (activeTab() === 'accounts') {
          <span
            class="absolute bottom-1.5 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full bg-accent"
          ></span>
        }
      </a>

      <!-- Center spacer for FAB -->
      <span class="w-16 shrink-0" aria-hidden="true"></span>

      <!-- Transactions -->
      <a
        routerLink="/transactions"
        class="relative flex items-center justify-center w-12 h-12 transition-colors"
        [class.text-ink]="activeTab() === 'transactions'"
        [class.text-ink-muted]="activeTab() !== 'transactions'"
        aria-label="Transaksi"
      >
        <svg
          class="w-[22px] h-[22px]"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M7 4l-4 4 4 4" />
          <path d="M3 8h14" />
          <path d="M17 20l4-4-4-4" />
          <path d="M21 16H7" />
        </svg>
        @if (activeTab() === 'transactions') {
          <span
            class="absolute bottom-1.5 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full bg-accent"
          ></span>
        }
      </a>

      <!-- Profile -->
      <a
        routerLink="/profile"
        class="relative flex items-center justify-center w-12 h-12 transition-colors"
        [class.text-ink]="activeTab() === 'profile'"
        [class.text-ink-muted]="activeTab() !== 'profile'"
        aria-label="Profil"
      >
        <svg
          class="w-[22px] h-[22px]"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="8" r="4" />
          <path d="M4 21a8 8 0 0 1 16 0" />
        </svg>
        @if (activeTab() === 'profile') {
          <span
            class="absolute bottom-1.5 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full bg-accent"
          ></span>
        }
      </a>
    </div>

    <!-- Long-press fab menu: indexed recipe-card tabs, blooming upward from FAB -->
    <div
      role="menu"
      aria-label="Aksi cepat"
      class="absolute left-1/2 -translate-x-1/2 bottom-[calc(100%+1.25rem)] z-10 flex flex-col items-stretch w-56 gap-2"
      [class.pointer-events-none]="!fabExpanded()"
    >
      <!-- iv · Kategori -->
      <button
        type="button"
        role="menuitem"
        (click)="goToNewCategory()"
        class="group relative flex items-center gap-3 rounded-2xl bg-card pl-3 pr-4 py-2.5 ring-1 ring-ink/5 shadow-[0_12px_22px_-12px_rgba(61,36,24,0.32),0_2px_4px_-1px_rgba(61,36,24,0.06)] transition-all duration-300 ease-out active:scale-[0.97]"
        [class.opacity-0]="!fabExpanded()"
        [class.translate-y-3]="!fabExpanded()"
        [style.transition-delay]="itemDelay(0)"
      >
        <span aria-hidden="true" class="block self-stretch w-px bg-gradient-to-b from-transparent via-accent-warm/55 to-transparent"></span>
        <svg class="w-[18px] h-[18px] text-chip-amber-ink shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20.5 12.5L12 21l-9-9V3h9z" />
          <circle cx="7.5" cy="7.5" r="1.4" />
        </svg>
        <span class="text-[13px] font-semibold text-ink">Kategori</span>
      </button>

      <!-- iii · Kalkulator -->
      <button
        type="button"
        role="menuitem"
        (click)="goToCalculator()"
        class="group relative flex items-center gap-3 rounded-2xl bg-card pl-3 pr-4 py-2.5 ring-1 ring-ink/5 shadow-[0_12px_22px_-12px_rgba(61,36,24,0.32),0_2px_4px_-1px_rgba(61,36,24,0.06)] transition-all duration-300 ease-out active:scale-[0.97]"
        [class.opacity-0]="!fabExpanded()"
        [class.translate-y-3]="!fabExpanded()"
        [style.transition-delay]="itemDelay(1)"
      >
        <span aria-hidden="true" class="block self-stretch w-px bg-gradient-to-b from-transparent via-accent-warm/55 to-transparent"></span>
        <svg class="w-[18px] h-[18px] text-chip-sky-ink shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="4" y="3" width="16" height="18" rx="2.2" />
          <path d="M8 7h8" />
          <path d="M8 12.25h.01 M12 12.25h.01 M16 12.25v3.5" />
          <path d="M8 16.25h.01 M12 16.25h.01" />
        </svg>
        <span class="text-[13px] font-semibold text-ink">Kalkulator</span>
      </button>

      <!-- ii · Impor -->
      <button
        type="button"
        role="menuitem"
        (click)="goToImport()"
        class="group relative flex items-center gap-3 rounded-2xl bg-card pl-3 pr-4 py-2.5 ring-1 ring-ink/5 shadow-[0_12px_22px_-12px_rgba(61,36,24,0.32),0_2px_4px_-1px_rgba(61,36,24,0.06)] transition-all duration-300 ease-out active:scale-[0.97]"
        [class.opacity-0]="!fabExpanded()"
        [class.translate-y-3]="!fabExpanded()"
        [style.transition-delay]="itemDelay(2)"
      >
        <span aria-hidden="true" class="block self-stretch w-px bg-gradient-to-b from-transparent via-accent-warm/55 to-transparent"></span>
        <svg class="w-[18px] h-[18px] text-chip-coral-ink shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2.2" />
          <circle cx="8.5" cy="8.5" r="1.4" />
          <path d="M21 15l-5-5L5 21" />
        </svg>
        <span class="text-[13px] font-semibold text-ink">Impor</span>
      </button>

      <!-- i · Transaksi (primary, closest to FAB) -->
      <button
        type="button"
        role="menuitem"
        (click)="goToNewTransaction()"
        class="group relative flex items-center gap-3 rounded-2xl bg-card pl-3 pr-4 py-2.5 ring-1 ring-ink/5 shadow-[0_12px_22px_-12px_rgba(61,36,24,0.32),0_2px_4px_-1px_rgba(61,36,24,0.06)] transition-all duration-300 ease-out active:scale-[0.97]"
        [class.opacity-0]="!fabExpanded()"
        [class.translate-y-3]="!fabExpanded()"
        [style.transition-delay]="itemDelay(3)"
      >
        <span aria-hidden="true" class="block self-stretch w-px bg-gradient-to-b from-transparent via-accent-warm/55 to-transparent"></span>
        <svg class="w-[18px] h-[18px] text-chip-green-ink shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <circle cx="16" cy="12" r="1.5" />
        </svg>
        <span class="text-[13px] font-semibold text-ink">Transaksi</span>
      </button>
    </div>

    <!-- Center FAB: wax-seal stamp with bloom halo when expanded -->
    <button
      type="button"
      (click)="onFabClick()"
      (pointerdown)="onFabPress()"
      (pointerup)="onFabRelease()"
      (pointerleave)="onFabRelease()"
      (pointercancel)="onFabRelease()"
      [attr.aria-expanded]="fabExpanded()"
      aria-haspopup="menu"
      aria-label="Aksi cepat"
      class="absolute left-1/2 -translate-x-1/2 -top-8 w-[72px] h-[72px] rounded-full grid place-items-center transition-transform duration-200 ease-out active:scale-95"
    >
      <!-- Bloom halo: soft warm glow that swells when the menu opens -->
      <span
        aria-hidden="true"
        class="absolute -inset-3 rounded-full bg-accent/35 blur-lg transition-all duration-500 ease-out"
        [class.opacity-0]="!fabExpanded()"
        [class.opacity-100]="fabExpanded()"
        [class.scale-90]="!fabExpanded()"
        [class.scale-100]="fabExpanded()"
      ></span>

      <!-- Stamp core -->
      <span
        aria-hidden="true"
        class="absolute inset-0 rounded-full bg-accent shadow-[0_14px_30px_-8px_rgba(217,122,60,0.55),0_4px_10px_-2px_rgba(217,122,60,0.4)]"
      ></span>

      <!-- Embossed inner rim (the 'wax-seal' edge) -->
      <span
        aria-hidden="true"
        class="absolute inset-[6px] rounded-full ring-1 ring-inset ring-on-dark/25"
      ></span>

      <!-- + glyph: rotates 45° to × when expanded -->
      <svg
        class="relative w-[30px] h-[30px] text-on-dark transition-transform duration-300 ease-out"
        [class.rotate-45]="fabExpanded()"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
        aria-hidden="true"
      >
        <path d="M12 5v14 M5 12h14" />
      </svg>
    </button>
  </div>
</nav>
